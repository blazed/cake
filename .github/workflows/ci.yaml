name: Nix Builder

on:
  pull_request: {}
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix_lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: |
          accept-flake-config = true
    - uses: cachix/cachix-action@v17
      with:
        name: blazed
    - run: |
        nix run .#cake -- lint

  nix_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: blazed
      - run: |
          nix run .#cake -- check

  pkgs_x86_64_linux:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.job-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: |
          accept-flake-config = true
    - uses: cachix/cachix-action@v17
      with:
        name: blazed
    - id: job-matrix
      run: |
        echo "matrix=$(nix eval .#github-actions-package-matrix-x86-64-linux --json)" >> "$GITHUB_OUTPUT"

  hosts_x86_64_linux:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.job-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: |
          accept-flake-config = true
    - uses: cachix/cachix-action@v17
      with:
        name: blazed
    - id: job-matrix
      run: |
        echo "matrix=$(nix eval .#github-actions-host-matrix-x86-64-linux --json)" >> "$GITHUB_OUTPUT"

  pkg_x86_64_linux:
    needs: pkgs_x86_64_linux
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJson(needs.pkgs_x86_64_linux.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: |
          accept-flake-config = true
    - uses: cachix/cachix-action@v17
      if: ${{ matrix.pkg != 'pxebooter' }}
      with:
        name: blazed
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - env:
        PKG: ${{ matrix.pkg }}
      run: |
        nix build .#packages.x86_64-linux.$PKG -L

  router_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@v22
      with:
        extra-conf: |
          accept-flake-config = true
    - uses: cachix/cachix-action@v17
      with:
        name: blazed
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - run: |
        # First pass: substitute the cached result (or build fresh if absent).
        # --rebuild requires the output to already be in the store, so we
        # must seed it before asking nix to re-execute and bit-compare.
        nix build .#checks.x86_64-linux.router -L
        # Second pass: actually run the VMs on this runner and bit-compare
        # against the seeded output, instead of just trusting the cache.
        nix build .#checks.x86_64-linux.router -L --rebuild

  # Disable until own runners
  # host_x86_64_linux:
  #   needs: hosts_x86_64_linux
  #   runs-on: ${{ matrix.os }}
  #   strategy:
  #     matrix: ${{ fromJson(needs.hosts_x86_64_linux.outputs.matrix) }}
  #   steps:
  #   - uses: actions/checkout@v6
  #   - uses: DeterminateSystems/nix-installer-action@v22
  #     with:
  #       extra-conf: |
  #         accept-flake-config = true
  #   - uses: cachix/cachix-action@v17
  #     with:
  #       name: blazed
  #   - name: Run the Magic Nix Cache
  #     uses: DeterminateSystems/magic-nix-cache-action@v13
  #   - env:
  #       HOST: ${{ matrix.host }}
  #     run: |
  #       nix build .#nixosConfigurations.$HOST.config.system.build.toplevel

  summarize:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Build (matrix)
    needs: [pkg_x86_64_linux, nix_lint, nix_check, router_test]
    steps:
      - name: Check linting status
        if: ${{ needs.nix_lint.result != 'success' }}
        run: exit 1
      - name: Check flake check status
        if: ${{ needs.nix_check.result != 'success' }}
        run: exit 1
      - name: Check router test status
        if: ${{ needs.router_test.result != 'success' }}
        run: exit 1
      # - name: Check x86_64-linux host build matrix status
      #   if: ${{ needs.host_x86_64_linux.result != 'success' }}
      #   run: exit 1
      - name: Check x86_64-linux package build matrix status
        if: ${{ needs.pkg_x86_64_linux.result != 'success' }}
        run: exit 1
